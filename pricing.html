<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pricing Plans</title>
<meta name="description" content="Affordable CAD design pricing plans for students, standard and professional clients. InnoCAD Ghana offers competitive rates for 3D modeling and engineering services.">
<meta name="keywords" content="CAD pricing Ghana, affordable 3D modeling, engineering design cost Ghana, student CAD services">
<meta property="og:title" content="Pricing Plans – InnoCAD Ghana">
<link rel="apple-touch-icon" sizes="180x180" href="favicon_io/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="favicon_io/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon_io/favicon-16x16.png">
<link rel="manifest" href="favicon_io/site.webmanifest">
<meta property="og:description" content="Flexible pricing for students, professionals and industries. Get started with InnoCAD today.">
<meta property="og:url" content="https://innocadservices.com/pricing.html">
<meta property="og:type" content="website">

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
    }

    body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f5f5f5;
        padding: 20px;
    }

    /* Background image (blurred) */
    .bg {
        position: fixed;
        width: 100%;
        height: 100%;
        background: url('image/Tree phase.jpg') no-repeat center/cover;
        filter: blur(15px);
        transform: scale(1.1);
        z-index: -1;
    }

    /* Container */
    .container {
        text-align: center;
        color: #111;
        width: 100%;
        max-width: 800px;
    }

    h1 {
        font-size: 32px;
        font-weight: 700;
        margin-bottom: 8px;
    }

    .subtitle {
        color: #666;
        font-size: 14px;
        margin-bottom: 30px;
    }

    /* Tabs */
    .tabs {
        display: flex;
        gap: 40px;
        justify-content: center;
        align-items: center;
        flex-wrap: wrap;
    }

    .tab {
        position: relative;
        font-size: 20px;
        font-weight: 600;
        color: white;
        cursor: pointer;
        padding-bottom: 8px;
    }

    .tab a {
        color: white;
        text-decoration: none;
    }

    /* Default underline */
    .tab::after {
        content: "";
        position: absolute;
        left: 0;
        bottom: 0;
        width: 100%;
        height: 2px;
        background: rgba(255,255,255,0.6);
        transform: scaleX(0);
        transition: 0.3s ease;
    }

    /* Hover effect */
    .tab:hover::after {
        transform: scaleX(1);
    }

    /* Active tab */
    .tab.active::after {
        transform: scaleX(1);
        background: #4a6cff;
    }

    /* Close Button */
    .close-btn {
        position: absolute;
        top: 20px;
        right: 20px;
        width: 40px;
        height: 40px;
        background: rgba(0, 0, 0, 0.5);
        color: #fff;
        border: none;
        border-radius: 50%;
        font-size: 24px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.3s ease;
        z-index: 10;
    }

    .close-btn:hover {
        background: rgba(0, 0, 0, 0.8);
        transform: scale(1.1);
    }

    /* Mobile Responsive */
    @media (max-width: 768px) {
        h1 {
            font-size: 24px;
            margin-bottom: 6px;
        }

        .subtitle {
            margin-bottom: 20px;
            font-size: 13px;
        }

        .tabs {
            gap: 25px;
        }

        .tab {
            font-size: 16px;
        }
    }

    @media (max-width: 480px) {
        body {
            padding: 15px;
        }

        h1 {
            font-size: 20px;
            margin-bottom: 4px;
        }

        .subtitle {
            margin-bottom: 15px;
            font-size: 12px;
        }

        .tabs {
            gap: 15px;
        }

        .tab {
            font-size: 14px;
            padding-bottom: 6px;
        }
    }
</style>
</head>

<body>

<button class="close-btn" onclick="window.history.back()" aria-label="Go back">&times;</button>

<div class="bg"></div>

<div class="container">
    <h1>Pricing plans</h1>
    <p class="subtitle">Choose the right plan for your needs</p>

    <div class="tabs">
        <div class="tab"><a href="student_plan.html">Students</a></div>
        <div class="tab active"><a href="standard_plan.html">Standard</a></div>
        <div class="tab"><a href="professional-plan.html">Professional</a></div>
    </div>
</div>
<script src="auth.js"></script>
</body>
</html>
