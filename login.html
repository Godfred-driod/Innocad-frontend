<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — InnoCAD</title>
<meta name="description" content="InnoCAD – Professional 3D CAD design services in Ghana. Parts modeling, assembly, technical drawings and FEA simulation.">
<meta name="keywords" content="CAD services Ghana, 3D modeling Ghana, InnoCAD">
<meta property="og:title" content="InnoCAD – 3D Engineering Design">
<meta property="og:description" content="Professional CAD services for engineers, students and industries in Ghana.">
<meta property="og:url" content="https://innocadservices.com">
<meta property="og:type" content="website">
<meta http-equiv="X-Content-Type-Options" content="nosniff">
<meta name="referrer" content="no-referrer">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="manifest" href="/site.webmanifest">
<link rel="stylesheet" href="login.css">
<style>
.error-msg {
  background: #fee2e2;
  color: #991b1b;
  padding: 10px 14px;
  border-radius: 8px;
  font-size: 13px;
  margin-bottom: 16px;
  display: none;
  border: 1px solid #fecaca;
  font-family: Arial, sans-serif;
}
.success-msg {
  background: #d1fae5;
  color: #065f46;
  padding: 10px 14px;
  border-radius: 8px;
  font-size: 13px;
  margin-bottom: 16px;
  display: none;
  border: 1px solid #a7f3d0;
  font-family: Arial, sans-serif;
}
.join:disabled {
  opacity: 0.7;
  cursor: not-allowed;
  transform: none !important;
}
.spinner {
  display: inline-block;
  width: 14px;
  height: 14px;
  border: 2px solid rgba(255,255,255,0.4);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  margin-right: 6px;
  vertical-align: middle;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="container">
  <div class="close" onclick="window.history.back()">&times;</div>

  <div class="left">
    <img class="left-img" src="image/picture4.jpg" alt="InnoCAD visual">
    <div class="left-content">
      <h2>New Here?</h2>
      <a href="registration.html" class="signup-btn">Create Account</a>
    </div>
  </div>

  <div class="right">
    <h1>Welcome</h1>
    <p class="subtitle">Sign in to your InnoCAD account</p>

    <div class="error-msg" id="errorMsg"></div>
    <div class="success-msg" id="successMsg"></div>

    <form id="loginForm" novalidate autocomplete="off">
      <input
        id="login-email"
        name="email"
        type="email"
        placeholder="Email address"
        required
        autocomplete="email"
      >
      <input
        id="login-password"
        name="password"
        type="password"
        placeholder="Password"
        minlength="8"
        required
        autocomplete="current-password"
      >

      <div class="checkbox">
        <input id="terms" type="checkbox" name="terms" required>
        <label for="terms">Accept Terms &amp; Conditions</label>
      </div>

      <button type="submit" class="join" id="loginBtn">Sign In</button>
    </form>

    <div class="divider"><span>or</span></div>

    <button class="social google" id="googleBtn">
      <svg width="16" height="16" viewBox="0 0 24 24" style="margin-right:8px;vertical-align:middle;">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Sign in with Google
    </button>
  </div>
</div>

<script src="auth.js"></script>
<script>
  // ── HELPERS ──────────────────────────────────────────────
  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.style.display = 'block';
    document.getElementById('successMsg').style.display = 'none';
  }

  function showSuccess(msg) {
    const el = document.getElementById('successMsg');
    el.textContent = msg;
    el.style.display = 'block';
    document.getElementById('errorMsg').style.display = 'none';
  }

  function setLoading(loading) {
    const btn = document.getElementById('loginBtn');
    btn.disabled = loading;
    btn.innerHTML = loading
      ? '<span class="spinner"></span> Signing in...'
      : 'Sign In';
  }

  // ── REDIRECT IF ALREADY LOGGED IN ────────────────────────
  window.addEventListener('DOMContentLoaded', () => {
    if (params.get('error') === 'google') {
      showError('Google sign in failed. Please try again.');
    }
    if (InnoCAD.isLoggedIn()) {
      const user = InnoCAD.getUser();
      window.location.href = user.role === 'admin'
        ? 'admin.html'
        : 'user-dashboard.html';
      return;
    }

    // Show messages passed via URL
    const params = new URLSearchParams(window.location.search);
    if (params.get('verified') === 'true') {
      showSuccess('Email verified! You can now sign in.');
    }
    if (params.get('registered') === 'true') {
      showSuccess('Account created! Check your email to verify before signing in.');
    }
    if (params.get('session') === 'expired') {
      showError('Your session expired. Please sign in again.');
    }
  });

  // ── LOGIN FORM SUBMIT ─────────────────────────────────────
  document.getElementById('loginForm').addEventListener('submit', async function (e) {
    e.preventDefault();

    const email = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    const terms = document.getElementById('terms').checked;

    if (!email || !password) {
      showError('Please fill in your email and password.');
      return;
    }

    if (!terms) {
      showError('Please accept the Terms & Conditions to continue.');
      return;
    }

    setLoading(true);

    try {
      const res = await fetch(`${InnoCAD.API}/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({ email, password })
      });

      const data = await res.json();

      if (!data.success) {
        showError(data.message || 'Login failed. Please try again.');
        setLoading(false);
        return;
      }

      // Save auth data
      InnoCAD.saveAuth(data.data.accessToken, data.data.user);
      showSuccess('Login successful! Redirecting...');

      // Redirect based on role
      setTimeout(() => {
        const params = new URLSearchParams(window.location.search);
        const next = params.get('next');
        if (data.data.user.role === 'admin') {
          window.location.href = 'admin.html';
        } else if (next) {
          window.location.href = next;
        } else {
          window.location.href = 'user-dashboard.html';
        }
      }, 800);

    } catch (err) {
      showError('Network error. Please make sure the server is running.');
      setLoading(false);
    }
  });

  // ── GOOGLE SIGN IN ────────────────────────────────────────
  document.getElementById('googleBtn').addEventListener('click', () => {
    window.location.href = `${InnoCAD.API}/auth/google`;
  });
</script>

</body>
</html>
