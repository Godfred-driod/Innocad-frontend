<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account — InnoCAD</title>
<meta name="description" content="InnoCAD – Professional 3D CAD design services in Ghana. Parts modeling, assembly, technical drawings and FEA simulation.">
<meta name="keywords" content="CAD services Ghana, 3D modeling Ghana, InnoCAD">
<meta property="og:title" content="InnoCAD – 3D Engineering Design">
<meta property="og:description" content="Professional CAD services for engineers, students and industries in Ghana.">
<meta property="og:url" content="https://innocadservices.com">
<meta property="og:type" content="website">
<meta http-equiv="X-Content-Type-Options" content="nosniff">
<meta name="referrer" content="no-referrer">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="manifest" href="/site.webmanifest">
<link rel="stylesheet" href="style.css">
<style>
.registration-container {
  max-width: 580px;
  margin: 40px auto;
  padding: 36px;
  background: #fff;
  border-radius: 12px;
  box-shadow: 0 6px 24px rgba(15,23,42,0.08);
}

.registration-container h1 {
  font-size: 28px;
  color: #0f172a;
  margin-bottom: 6px;
}

.registration-container .subtitle {
  color: #6b7280;
  margin-bottom: 28px;
  font-size: 14px;
}

.form-group {
  margin-bottom: 20px;
}

.form-group label {
  display: block;
  margin-bottom: 7px;
  font-weight: 600;
  color: #0f172a;
  font-size: 14px;
}

.form-group input,
.form-group select {
  width: 100%;
  padding: 12px 14px;
  border: 1px solid #e2e8f0;
  border-radius: 8px;
  font-family: inherit;
  font-size: 14px;
  color: #222;
  transition: border-color 0.2s ease, box-shadow 0.2s ease;
  outline: none;
  background: #fff;
}

.form-group input:focus,
.form-group select:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(31,60,136,0.08);
}

.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}

.category-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-top: 4px;
}

.category-btn {
  border: 2px solid #e2e8f0;
  background: #fff;
  border-radius: 10px;
  padding: 14px 10px;
  cursor: pointer;
  text-align: center;
  transition: all 0.2s ease;
  font-family: inherit;
}

.category-btn:hover {
  border-color: var(--accent);
  background: var(--accent-soft);
}

.category-btn.selected {
  border-color: var(--accent);
  background: var(--accent);
  color: #fff;
}

.category-btn .cat-icon {
  font-size: 22px;
  margin-bottom: 6px;
  display: block;
}

.category-btn .cat-label {
  font-size: 12px;
  font-weight: 600;
  display: block;
}

.category-btn .cat-desc {
  font-size: 11px;
  color: #6b7280;
  margin-top: 2px;
  display: block;
  line-height: 1.3;
}

.category-btn.selected .cat-desc {
  color: rgba(255,255,255,0.8);
}

.password-hint {
  font-size: 12px;
  color: #6b7280;
  margin-top: 6px;
}

.submit-btn {
  width: 100%;
  padding: 13px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.2s ease;
  margin-top: 4px;
}

.submit-btn:hover {
  background: #152d6e;
  transform: translateY(-2px);
}

.submit-btn:disabled {
  opacity: 0.7;
  cursor: not-allowed;
  transform: none;
}

.login-link {
  text-align: center;
  margin-top: 20px;
  font-size: 14px;
  color: #6b7280;
}

.login-link a {
  color: var(--accent);
  font-weight: 600;
  text-decoration: none;
}

.login-link a:hover { text-decoration: underline; }

.error-msg {
  background: #fee2e2;
  color: #991b1b;
  padding: 10px 14px;
  border-radius: 8px;
  font-size: 13px;
  margin-bottom: 16px;
  display: none;
  border: 1px solid #fecaca;
}

.success-msg {
  background: #d1fae5;
  color: #065f46;
  padding: 10px 14px;
  border-radius: 8px;
  font-size: 13px;
  margin-bottom: 16px;
  display: none;
  border: 1px solid #a7f3d0;
}

.spinner {
  display: inline-block;
  width: 14px;
  height: 14px;
  border: 2px solid rgba(255,255,255,0.4);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  margin-right: 6px;
  vertical-align: middle;
}

@keyframes spin { to { transform: rotate(360deg); } }

.divider {
  display: flex;
  align-items: center;
  margin: 20px 0;
  font-size: 13px;
  color: #888;
}

.divider::before,
.divider::after {
  content: "";
  flex: 1;
  height: 1px;
  background: #e2e8f0;
}

.divider span { margin: 0 12px; }

.google-btn {
  width: 100%;
  padding: 12px;
  border: 1px solid #e2e8f0;
  background: #fff;
  border-radius: 8px;
  font-size: 14px;
  cursor: pointer;
  font-family: inherit;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  transition: all 0.2s ease;
  font-weight: 500;
}

.google-btn:hover {
  background: #f8fafc;
  border-color: #cbd5e1;
  transform: translateY(-1px);
}

@media (max-width: 600px) {
  .registration-container {
    margin: 20px;
    padding: 24px;
  }
  .form-row { grid-template-columns: 1fr; }
  .category-grid { grid-template-columns: 1fr; }
}
</style>
</head>

<body>

<nav>
  <div class="logo">InnoCAD</div>
  <button class="hamburger" id="hamburger" aria-label="Toggle menu" style="margin-left:auto;">
    <span></span><span></span><span></span>
  </button>
  <div class="nav-left" id="navMenu">
    <div class="nav-links">
      <a href="Index.html">Home</a>
      <a href="services.html">Services</a>
      <a href="portfolio.html">Portfolio</a>
      <a href="pricing.html">Prices</a>
      <a class="contact" href="contact.html">Contact us</a>
    </div>
    <a class="nav-login" href="login.html" aria-label="Login">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <circle cx="12" cy="8" r="3" stroke="#0f172a" stroke-width="1.5"/>
        <path d="M4 20c0-4 4-6 8-6s8 2 8 6" stroke="#0f172a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </a>
  </div>
</nav>

<main>
  <div class="registration-container">
    <h1>Create Account</h1>
    <p class="subtitle">Join InnoCAD and start bringing your ideas to life</p>

    <div class="error-msg" id="errorMsg"></div>
    <div class="success-msg" id="successMsg"></div>

    <form id="registrationForm" novalidate autocomplete="off">

      <!-- Name -->
      <div class="form-group">
        <label for="name">Full Name *</label>
        <input type="text" id="name" name="name" required placeholder="Enter your full name">
      </div>

      <!-- Email -->
      <div class="form-group">
        <label for="email">Email Address *</label>
        <input type="email" id="email" name="email" required placeholder="Enter your email address">
      </div>

      <!-- Password -->
      <div class="form-group">
        <label for="password">Password *</label>
        <input type="password" id="password" name="password" required placeholder="Create a strong password">
        <div class="password-hint">Min 8 characters, must include a number and a special character</div>
      </div>

      <!-- Category -->
      <div class="form-group">
        <label>I am a *</label>
        <div class="category-grid">
          <button type="button" class="category-btn" data-value="student">
            <span class="cat-icon">🎓</span>
            <span class="cat-label">Student</span>
            <span class="cat-desc">Academic & learning projects</span>
          </button>
          <button type="button" class="category-btn" data-value="standard">
            <span class="cat-icon">💼</span>
            <span class="cat-label">Standard</span>
            <span class="cat-desc">Professional & industry work</span>
          </button>
          <button type="button" class="category-btn" data-value="professional">
            <span class="cat-icon">⭐</span>
            <span class="cat-label">Professional</span>
            <span class="cat-desc">Large scale & complex projects</span>
          </button>
        </div>
        <input type="hidden" id="category" name="category" value="">
      </div>

      <button type="submit" class="submit-btn" id="submitBtn">Create Account</button>
    </form>

    <div class="divider"><span>or</span></div>

    <button class="google-btn" id="googleBtn">
      <svg width="18" height="18" viewBox="0 0 24 24">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Continue with Google
    </button>

    <div class="login-link">
      Already have an account? <a href="login.html">Sign in</a>
    </div>
  </div>
</main>

<script src="auth.js"></script>
<script src="app.js"></script>
<script>
  // ── HELPERS ──────────────────────────────────────────────
  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.style.display = 'block';
    document.getElementById('successMsg').style.display = 'none';
    el.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }

  function showSuccess(msg) {
    const el = document.getElementById('successMsg');
    el.textContent = msg;
    el.style.display = 'block';
    document.getElementById('errorMsg').style.display = 'none';
  }

  function setLoading(loading) {
    const btn = document.getElementById('submitBtn');
    btn.disabled = loading;
    btn.innerHTML = loading
      ? '<span class="spinner"></span> Creating account...'
      : 'Create Account';
  }

  // ── CATEGORY SELECTION ────────────────────────────────────
  document.querySelectorAll('.category-btn').forEach(btn => {
    btn.addEventListener('click', function () {
      document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('selected'));
      this.classList.add('selected');
      document.getElementById('category').value = this.dataset.value;
    });
  });

  // ── REDIRECT IF ALREADY LOGGED IN ────────────────────────
  window.addEventListener('DOMContentLoaded', () => {
    if (InnoCAD.isLoggedIn()) {
      const user = InnoCAD.getUser();
      window.location.href = user.role === 'admin'
        ? 'admin.html'
        : 'user-dashboard.html';
    }
  });

  // ── REGISTRATION FORM SUBMIT ──────────────────────────────
  document.getElementById('registrationForm').addEventListener('submit', async function (e) {
    e.preventDefault();

    const name = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const category = document.getElementById('category').value;

    // Validation
    if (!name || name.length < 2) {
      showError('Please enter your full name.');
      return;
    }

    if (!email) {
      showError('Please enter your email address.');
      return;
    }

    if (!password || password.length < 8) {
      showError('Password must be at least 8 characters.');
      return;
    }

    if (!/[0-9]/.test(password)) {
      showError('Password must contain at least one number.');
      return;
    }

    if (!/[^a-zA-Z0-9]/.test(password)) {
      showError('Password must contain at least one special character (e.g. @, #, !).');
      return;
    }

    if (!category) {
      showError('Please select your category.');
      return;
    }

    setLoading(true);

    try {
      const res = await fetch(`${InnoCAD.API}/auth/register`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, email, password, category })
      });

      const data = await res.json();

      if (!data.success) {
        showError(data.message || 'Registration failed. Please try again.');
        setLoading(false);
        return;
      }

      showSuccess('Account created! Check your email to verify your account before signing in.');
      setLoading(false);

      // Redirect to login after 3 seconds
      setTimeout(() => {
        window.location.href = 'login.html?registered=true';
      }, 3000);

    } catch (err) {
      showError('Network error. Please make sure the server is running.');
      setLoading(false);
    }
  });

  // ── GOOGLE SIGN UP ────────────────────────────────────────
  document.getElementById('googleBtn').addEventListener('click', () => {
    window.location.href = `${InnoCAD.API}/auth/google`;
  });
</script>

</body>
</html>
